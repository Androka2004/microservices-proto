syntax = "proto3";

option go_package = "github.com/Androka2004/microservices-proto/golang/shipping";

message ShippingItem {
  string product_code = 1;
  float unit_price = 2;
  int32 quantity = 3;
}

message CreateShippingRequest {
  int64 order_id = 1;
  repeated ShippingItem order_items = 2;
}

message CreateShippingResponse {
  int64 order_id = 1;
  int32 delivery_days = 2;
}

service Shipping {
  rpc Create(CreateShippingRequest) returns (CreateShippingResponse) {}
}
